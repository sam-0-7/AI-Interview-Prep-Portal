services:
  - type: web
    name: ai-interview-portal
    runtime: docker
    dockerfilePath: ./AIInterviewPortal/Dockerfile
    dockerContext: ./AIInterviewPortal
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      - key: GEMINI__APIKEY
        sync: false   # You will paste this manually in Render dashboard

databases:
  - name: ai-interview-db
    plan: free
    databaseName: aiinterviewportal
    user: aiinterviewuser
